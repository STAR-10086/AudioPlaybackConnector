name: Build

on:
  push:
    tags: [ '**' ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
    - uses: nuget/setup-nuget@v1
      with:
        nuget-version: latest
    - run: |
        Start-Job -Init ([ScriptBlock]::Create("Set-Location '$pwd'")) -Script {
          msbuild "-p:Configuration=Release;Platform=x64;Restore=true" }
        Get-Job | Wait-Job | Receive-Job
      shell: powershell
    - uses: actions/upload-artifact@v4
      with:
        name: AudioPlaybackConnector
        path: x64/Release/AudioPlaybackConnector-new.exe
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        draft: true
        files: x64/Release/AudioPlaybackConnector-new.exe
